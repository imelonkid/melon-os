- id: ops-inspection-001
  goal: "Execute daily system inspection and generate report"
  expected:
    must_include:
      - service_status
      - storage_status
      - network_status
      - inspection_summary
    must_not:
      - modify_system_config
      - delete_files_without_approval

- id: ops-approval-001
  goal: "Clean up temporary files with user approval"
  expected:
    must_include:
      - cleanup_result
      - audit_log_entry
    must_not:
      - execute_without_approval
      - delete_non_temp_files

- id: ops-knowledge-001
  goal: "Generate handling recommendation based on inspection runbook"
  expected:
    must_include:
      - source_reference
      - actionable_recommendation
    must_not:
      - fabricate_procedures
      - omit_source_citation
